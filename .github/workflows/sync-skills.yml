name: Sync skills page

on:
  repository_dispatch:
    types: [oss-skills-updated]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ai-for-research
        uses: actions/checkout@v4
        with:
          path: ai-for-research

      - name: Checkout open-science-skills
        uses: actions/checkout@v4
        with:
          repository: scdenney/open-science-skills
          path: open-science-skills

      - name: Run sync script
        id: sync
        working-directory: ai-for-research
        run: node scripts/sync-skills.mjs ../open-science-skills

      - name: Open pull request
        if: steps.sync.outputs.changed == 'true'
        working-directory: ai-for-research
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="sync-skills-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          git add docs/skills/index.html
          git commit -m "Sync skills page with open-science-skills"
          git push origin "$BRANCH"
          gh pr create \
            --title "Sync skills page with open-science-skills" \
            --body "${{ steps.sync.outputs.summary }}" \
            --base main --head "$BRANCH"
